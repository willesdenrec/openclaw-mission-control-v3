<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ff9d" />
            <stop offset="100%" stop-color="#00b8ff" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <rect width="100" height="100" fill="#0a0a0f" />
    
    <!-- Circuit Pattern -->
    <g opacity="0.3">
        <rect x="20" y="20" width="60" height="60" rx="10" fill="none" stroke="#00ff9d" stroke-width="1" />
        <rect x="30" y="30" width="40" height="40" rx="8" fill="none" stroke="#00b8ff" stroke-width="1" />
        <circle cx="50" cy="50" r="15" fill="none" stroke="#ff00aa" stroke-width="1" />
    </g>
    
    <!-- Central Processor -->
    <g filter="url(#glow)">
        <!-- Main Chip -->
        <rect x="35" y="35" width="30" height="30" rx="6" fill="url(#gradient)" />
        
        <!-- Circuit Lines -->
        <path d="M20,50 L35,50" stroke="#00ff9d" stroke-width="2" />
        <path d="M65,50 L80,50" stroke="#00ff9d" stroke-width="2" />
        <path d="M50,20 L50,35" stroke="#00b8ff" stroke-width="2" />
        <path d="M50,65 L50,80" stroke="#00b8ff" stroke-width="2" />
        
        <!-- Data Nodes -->
        <circle cx="20" cy="50" r="3" fill="#00ff9d" />
        <circle cx="80" cy="50" r="3" fill="#00ff9d" />
        <circle cx="50" cy="20" r="3" fill="#00b8ff" />
        <circle cx="50" cy="80" r="3" fill="#00b8ff" />
        
        <!-- Processor Core -->
        <circle cx="50" cy="50" r="8" fill="#ffffff" />
        <path d="M46,46 L54,54 M54,46 L46,54" stroke="#0a0a0f" stroke-width="2" />
    </g>
    
    <!-- Animated Pulse -->
    <circle cx="50" cy="50" r="20" fill="none" stroke="#00ff9d" stroke-width="1" opacity="0.5">
        <animate attributeName="r" from="20" to="40" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite" />
    </circle>
</svg>